---
- name: Create Namespace across Multiple ACM Managed Clusters
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../vault/vault.yaml  # Contains hub_url and token_acm
  vars:
    # Define the list of target clusters
    target_clusters:
      - local-cluster
      - cluster2
    
    namespace_name: "prod-apps"

  tasks:
    - name: Create ManifestWorks for each cluster
      kubernetes.core.k8s:
        # Utilizing the fallbacks that worked for your environment
        host: "{{ lookup('ansible.builtin.env', 'K8S_AUTH_HOST') | default(k8s_host, true) }}"
        api_key: "{{ lookup('ansible.builtin.env', 'K8S_AUTH_API_KEY') | default(k8s_auth_api_key, true) }}"
        verify_ssl: false 
        state: present
        definition:
          apiVersion: work.open-cluster-management.io/v1
          kind: ManifestWork
          metadata:
            # We append the cluster name to the ManifestWork name to keep them unique on the Hub
            name: "create-{{ namespace_name }}-ns-{{ item }}"
            # The namespace on the Hub cluster named after the managed cluster
            namespace: "{{ item }}"
          spec:
            workload:
              manifests:
                - apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: "{{ namespace_name }}"
                    labels:
                      managed-by: "acm-aap-integration"
                      deployed-via: "ansible-loop"
      # This loop iterates over the target_clusters list
      loop: "{{ target_clusters }}"
      register: manifest_results

    - name: Summary of operations
      ansible.builtin.debug:
        msg: "ManifestWork created for cluster: {{ item.item }}"
      loop: "{{ manifest_results.results }}"
      when: item.changed