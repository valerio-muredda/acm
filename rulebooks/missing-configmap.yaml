---
- name: Listen for ACM Multicluster Alerts
  hosts: all
  sources:
    - ansible.eda.alertmanager: {}

  rules:
    # --- 1. THE TARGET RULE (Now with a Debug Action) ---
    - name: Trigger Remediation for Dummy Alert on Cluster1
      condition: event.payload.alerts[0].labels.alertname == "DummyAlertTriggered" and event.payload.status == "firing"
      action:
        debug:
          msg: >-
            SUCCESS! The condition matched perfectly. 
            Target Cluster: {{ event.payload.alerts[0].labels.cluster }} 
            Alert Summary: {{ event.payload.alerts[0].annotations.summary }}

    # --- 2. FALLBACK DEBUG RULE ---
    - name: Catch Unmatched Events
      condition: true
      action:
        debug:
          msg: "FAILED to match the target condition. Dropped to fallback."