---
- name: Listen for ACM Multicluster Alerts
  hosts: all
  sources:
    # The event stream infrastructure handles the actual ingress and network routing
    - ansible.eda.alertmanager: {}

  rules:
    - name: Trigger Remediation for Dummy Alert on Cluster1
      condition: event.alert.labels.alertname == "DummyAlertTriggered" and event.alert.status == "firing"
      action:
        run_job_template:
          name: "Remediate Missing ConfigMap"
          organization: "Default"
          job_args:
            extra_vars:
              target_cluster: "{{ event.alert.labels.cluster }}"
              alert_summary: "{{ event.alert.annotations.summary }}"