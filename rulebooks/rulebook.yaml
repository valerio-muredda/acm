---
- name: Listen for Bookinfo Failures
  hosts: all
  sources:
    - ansible.eda.alertmanager:
        host: 0.0.0.0
        port: 8002 #5000
  rules:
    - name: Trigger Migration on Reviews Failure
      condition:
        all:
          - event.alert.labels.alertname == "ReviewsServiceFailure"
          - event.alert.status == "firing"
      action:
        run_job_template:
          name: "Bookinfo - Failover reviews"
          organization: "Default"